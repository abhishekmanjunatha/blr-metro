<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Official Namma Metro Logo Style -->
  <defs>
    <linearGradient id="metroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#metroGradient)"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="75" fill="#ffffff"/>
  
  <!-- Metro symbol - simplified train -->
  <g transform="translate(100, 85)">
    <!-- Train body -->
    <rect x="-35" y="-20" width="70" height="35" rx="5" fill="url(#metroGradient)"/>
    
    <!-- Windows -->
    <rect x="-28" y="-13" width="18" height="12" rx="2" fill="#e0e7ff"/>
    <rect x="-5" y="-13" width="18" height="12" rx="2" fill="#e0e7ff"/>
    <rect x="10" y="-13" width="18" height="12" rx="2" fill="#e0e7ff"/>
    
    <!-- Front lights -->
    <circle cx="-30" cy="8" r="3" fill="#fbbf24"/>
    <circle cx="30" cy="8" r="3" fill="#fbbf24"/>
    
    <!-- Wheels -->
    <circle cx="-22" cy="15" r="4" fill="#374151"/>
    <circle cx="-8" cy="15" r="4" fill="#374151"/>
    <circle cx="8" cy="15" r="4" fill="#374151"/>
    <circle cx="22" cy="15" r="4" fill="#374151"/>
  </g>
  
  <!-- Metro line representation -->
  <line x1="40" y1="140" x2="160" y2="140" stroke="url(#greenLine)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Station dots -->
  <circle cx="60" cy="140" r="5" fill="#10b981"/>
  <circle cx="100" cy="140" r="5" fill="#10b981"/>
  <circle cx="140" cy="140" r="5" fill="#10b981"/>
  
  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#7c3aed">NAMMA METRO</text>
</svg>
